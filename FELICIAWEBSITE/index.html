                data-description="Dead standing trees (often called snags) are common in forests, and play an important role in the ecosystem. They provide food and shelter for a lot of wildlife, such as birds, insecs, and other small critters that use tree cavities for denning. They are also important in terms for food, serving as a source for bugs and fungi. Sometimes they are caused by rotting from the inside out, from disease or insects, or from injuries like ice storms or even lightning strikes. Either way, they are a show of how vital simple trees are to its ecosystem and the number of roles one tree can play, even after it dies.">
            <img src="images/Tsunami Before.png" alt="Tsunami" class="masonry-item small ENVIRONMENTAL hover-swap"

            <img src="images/small desire path.jpg" alt="Desire Path" class="masonry-item square REPETITIVE-WEAR"
                data-title="Desire Path" data-category="Repetitive Wear" data-link="https://www.boredpanda.com/preferred-manmade-desire-paths-pics/"
                data-description="Desire lines (also known as desire paths) are the informal paths created by continuous foot traffic, often making shortcuts between two points. Such repetitive motion wears down the ground, creating a visible trail that shows where people want to go in place of the intended paths.">
            <img src="images/middle seat.jpg" alt="Middle Seat" class="masonry-item REPETITIVE-WEAR"
                data-title="Middle Seat" data-category="Repetitive Wear" data-link=""
                data-description="The middle seat of a row is often the last chosen and least used. Over time, it keeps more of its original form while the window and aisle seats show more wear. The object is shaped as much by avoidance as by use, absence leaving its own kind of impression while also showing peoples preferences in a subtle way.">
            <img src="images/keyboard.jpg" alt="Keyboard" class="masonry-item square REPETITIVE-WEAR"
                data-title="Keyboard" data-category="Repetitive Wear" data-link="https://www.boredpanda.com/well-worn-things/?utm_medium=social&utm_source=facebook&utm_term=bp_2061108&utm_campaign=bored-panda-art&utm_content=image"
                data-description="Keyboards are a common example of objects that clearly show wear from repetitive use. Commonly used keys often include the spacebar, enter key, and frequently used letters (like WASD for gaming). Over time, the paint can fade, they can become shinier, or even wear down to the point of breaking. This also counts as a desire line, as they show a person's habits and preferences based on which keys are most worn down.">

    <script>
        const STYLE_STORAGE_KEY = "memoryFoamButtonStyle";
        const styleToggleBtn = document.getElementById("style-toggle-btn");

        function applyButtonStyle(style) {
            if (style === "classic") {
                document.body.setAttribute("data-button-style", "classic");
                if (styleToggleBtn) styleToggleBtn.textContent = "STYLE: CLASSIC";
            } else {
                document.body.removeAttribute("data-button-style");
                if (styleToggleBtn) styleToggleBtn.textContent = "STYLE: ORGANIC";
            }
        }

        const savedStyle = localStorage.getItem(STYLE_STORAGE_KEY);
        applyButtonStyle(savedStyle === "classic" ? "classic" : "organic");

        if (styleToggleBtn) {
            styleToggleBtn.addEventListener("click", function () {
                const isClassic = document.body.getAttribute("data-button-style") === "classic";
                const nextStyle = isClassic ? "organic" : "classic";
                applyButtonStyle(nextStyle);
                localStorage.setItem(STYLE_STORAGE_KEY, nextStyle);
            });
        }

        $(".filter-btn").click(function () {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            var f = $(this).data("filter");

            if ($(this).hasClass("active")) {
                // clicking the active filter again resets to all
                $(".masonry-item").fadeIn(300);
                $(this).removeClass("active");
                return;
            }

            // apply selected filter
            $(".masonry-item").filter(f).fadeIn(300);
            $(".masonry-item").not(f).fadeOut(300);
            $(this).addClass("active").siblings().removeClass("active");
        });

        // Load below-the-fold images on demand for faster first paint.
        const masonryItems = $(".masonry-item");
        masonryItems.attr({ loading: "lazy", decoding: "async", fetchpriority: "low" });
        masonryItems.slice(0, 8).attr({ loading: "eager", fetchpriority: "high" });

        const masks = ['image-mask-1', 'image-mask-2', 'image-mask-3', 'image-mask-4', 'image-mask-5', 'image-mask-6', 'image-mask-7'];
        $(".masonry-item").each(function () {
            const picked = masks[Math.floor(Math.random() * masks.length)];
            $(this).css('clip-path', `url(#${picked})`);
        });

        // store original image source for hover-swap items
        $(".masonry-item.hover-swap").each(function () {
            if (!$(this).data("original-src")) {
                $(this).data("original-src", $(this).attr("src"));
            }
        });

        // hover image swap for items with data-swap-src
        $(".masonry-item.hover-swap").hover(
            function () {
                const swap = $(this).data("swap-src");
                if (swap) $(this).attr("src", swap);
            },
            function () {
                const original = $(this).data("original-src");
                if (original) $(this).attr("src", original);
            }
        );

        $(".masonry-item").click(function () {
            var params = new URLSearchParams({
                src: $(this).attr("src").replace("images/", ""),
                title: $(this).data("title"),
                category: $(this).data("category"),
                description: $(this).data("description"),
                link: $(this).attr("data-link") || ""
            });
            var swapSrc = $(this).data("swap-src");
            if (swapSrc) {
                params.set("swap", swapSrc.replace("images/", ""));
            }
            var url = "detail.html?" + params.toString();
            console.log("detail url", url);
            window.location.href = url;
        });
    </script>


</body>
