    <script>
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || '';
        const category = params.get('category') || '';
        const src = params.get('src') || '';
        const description = params.get('description') || '';
        const link = params.get('link') || '';
        const learnMore = document.getElementById('detail-learn-more');

        document.getElementById('detail-heading').textContent = category.toUpperCase() + ': ' + title;
        document.getElementById('detail-image').src = 'images/' + src;
        document.getElementById('detail-image').alt = title;
        document.getElementById('detail-description').textContent = description;
        document.title = 'MEMORY FOAM — ' + title;

        if (link) {
            learnMore.style.display = 'block';
            learnMore.textContent = 'LEARN MORE';
            learnMore.href = link;
            learnMore.target = '_blank';
            learnMore.rel = 'noopener noreferrer';
        } else {
            learnMore.style.display = 'none';
        }

        const masks = ['image-mask-1', 'image-mask-2', 'image-mask-3', 'image-mask-4', 'image-mask-5', 'image-mask-6', 'image-mask-7'];
        const picked = masks[Math.floor(Math.random() * masks.length)];
        document.getElementById('detail-image').style.clipPath = `url(#${picked})`;
