<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMORY FOAM</title>
    <link rel="stylesheet" href="./website-banner.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <!-- top banner -->
    <header class="banner">
        <div class="banner-top">
            <div class="banner-title">
                <h1><strong>MEMORY FOAM</strong></h1>
                <h2>Archive of the Lasting Effects on Earth left <br>
                     by Different Types of Pressure
                </h2>
            </div>
        </div>
        <nav class="banner-nav">
            <button class="nav-btn" data-target="#overview">Overview</button>
        </nav>
    </header>

    <!-- contents -->
    <main class="content">
        <div class="masonry">
            <div class="masonry-item">Item 1<br>Line 2</div>
            <div class="masonry-item">Item 2</div>
            <div class="masonry-item">Item 3<br>Second</div>
            <div class="masonry-item">Item 4</div>
            <div class="masonry-item">Item 5<br>Line</div>
            <div class="masonry-item">Item 6</div>
            <div class="masonry-item">Item 7</div>
            <div class="masonry-item">Item 8<br>Line 2<br>Line 3</div>
            <div class="masonry-item">Item 9</div>
            <div class="masonry-item">Item 10</div>
        </div>
    </main>

    <script>
        $(document).ready(function () {

            // Keep content below the fixed banner
            function updateContentPadding() {
                var bannerHeight = $('.banner').outerHeight();
                $('.content').css('padding-top', bannerHeight + 'px');
            }

            updateContentPadding();
            $(window).on('resize', updateContentPadding);

            // Smooth scroll to section on nav button click
            $('.nav-btn').on('click', function () {
                var target = $(this).data('target');
                var bannerHeight = $('.banner').outerHeight();
                $('html, body').animate({
                    scrollTop: $(target).offset().top - bannerHeight
                }, 600);
            });

        });
    </script>

</body>

</html>
