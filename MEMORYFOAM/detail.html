<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMORY FOAM</title>
    <meta name="description" content="Explore examples of lasting effects and pressures on Earth.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="MEMORY FOAM">
    <meta property="og:title" content="MEMORY FOAM — Detail">
    <meta property="og:description" content="Explore examples of lasting effects and pressures on Earth.">
    <meta property="og:image" content="./images/FAVICON.png">
    <meta property="og:url" content="./detail.html">
  
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Dirt&family=Rubik+Maps&family=Rubik+Puddles&family=Rubik+Spray+Paint&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./images/FAVICON.png">
    <link rel="stylesheet" href="./main.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="./images/FAVICON 7.png">

</head>
<body class="no-banner-blur">

    <div class="footprint-layer" aria-hidden="true">
        <img src="./images/footprints4.png" class="footprint fp-1" alt="">
        <img src="./images/footprints4.png" class="footprint fp-2" alt="">
        <img src="./images/footprints4.png" class="footprint fp-3" alt="">
    </div>

    <header class="banner">
        <div class="banner-top">
            <h1>MEMORY FOAM</h1>
            <h2>ARCHIVE OF THE LASTING EFFECTS ON EARTH <br>LEFT BY DIFFERENT TYPES OF PRESSURE</h2>
        </div>
    </header>

    <main class="detail-page">
        <section class="detail-layout">
            <div class="detail-image-row" id="detail-image-row">
                <img class="detail-image" id="detail-image-primary" src="" alt="">
                <img class="detail-image" id="detail-image-secondary" src="" alt="" hidden>
            </div>
            <div class="detail-copy">
                <div class="detail-heading-row">
                    <h3 class="detail-heading" id="detail-heading">
                        <span id="detail-category"></span>
                        <span class="detail-title-line" id="detail-title"></span>
                    </h3>
                    <button class="banner-btn detail-back-btn" onclick="history.back()">BACK</button>
                </div>
                <p class="detail-description" id="detail-description"></p>
                <br>
                <br>
                <a class="detail-learn-more" id="detail-learn-more" href="#">LEARN MORE</a>
            </div>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || '';
        const category = params.get('category') || '';
        const src = params.get('src') || '';
        const swap = params.get('swap') || '';
        const description = params.get('description') || '';
        const link = params.get('link') || '';
        const learnMore = document.getElementById('detail-learn-more');
        const detailCategory = document.getElementById('detail-category');
        const detailTitle = document.getElementById('detail-title');
        const primaryImage = document.getElementById('detail-image-primary');
        const secondaryImage = document.getElementById('detail-image-secondary');
        const imageRow = document.getElementById('detail-image-row');

        detailCategory.textContent = category ? category.toUpperCase() + ':' : '';
        detailTitle.textContent = title;
        primaryImage.src = 'images/' + src;
        primaryImage.alt = title;

        if (swap) {
            secondaryImage.src = 'images/' + swap;
            secondaryImage.alt = title + ' alternate image';
            secondaryImage.hidden = false;
            imageRow.classList.add('has-two-images');
        }

        document.getElementById('detail-description').textContent = description;
        document.title = 'MEMORY FOAM — ' + title;

        if (link) {
            learnMore.style.display = 'block';
            learnMore.textContent = 'LEARN MORE';
            learnMore.href = link;
            learnMore.target = '_blank';
            learnMore.rel = 'noopener noreferrer';
        } else {
            learnMore.style.display = 'none';
        }

    </script>

</body>
</html>
